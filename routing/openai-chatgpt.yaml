# GPT-5.6 routing policy. Availability is resolved against each account's live
# catalog; no speed tier is assumed. Coding prefers any catalog Codex model and
# then Terra/Sol. Other roles try Sol, Terra, and Luna in that order. During a
# staged rollout, catalog resolution skips absent candidates rather than sending
# an unavailable GPT-5.6 ID.
name: openai-chatgpt
description: "OpenAI ChatGPT backend with account-scoped model discovery"
updated: "2026-07-19"
roles:
  general: &general
    candidates:
      - {provider: openai-chatgpt, model: gpt-5.6-sol}
      - {provider: openai-chatgpt, model: gpt-5.6-terra}
      - {provider: openai-chatgpt, model: gpt-5.6-luna}
      - {provider: openai-chatgpt, model: "gpt-5.*"}
  fast: *general
  ui-coding: *general
  creative: *general
  writing: *general
  vision: *general
  image-gen: *general
  coding:
    candidates:
      - {provider: openai-chatgpt, model: "gpt-?.?-codex*"}
      - {provider: openai-chatgpt, model: gpt-5.6-terra}
      - {provider: openai-chatgpt, model: gpt-5.6-sol}
      - {provider: openai-chatgpt, model: "gpt-5.*"}
  reasoning: &reasoning
    candidates:
      - provider: openai-chatgpt
        model: gpt-5.6-sol
        config: {reasoning_effort: high}
      - provider: openai-chatgpt
        model: gpt-5.6-terra
        config: {reasoning_effort: high}
      - {provider: openai-chatgpt, model: "gpt-5.*"}
  security-audit: *reasoning
  research: *reasoning
  critical-ops: *reasoning
  critique:
    candidates:
      - provider: openai-chatgpt
        model: gpt-5.6-sol
        config: {reasoning_effort: max}
      - provider: openai-chatgpt
        model: gpt-5.6-terra
        config: {reasoning_effort: xhigh}
      - {provider: openai-chatgpt, model: "gpt-5.*"}
