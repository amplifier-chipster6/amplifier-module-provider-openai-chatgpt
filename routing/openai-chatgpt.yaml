# Routing Matrix: openai-chatgpt
#
# GPT-5.6 policy is documented in docs/ROUTING_POLICY.md. Keep this file and
# tests/test_routing.py in sync when changing candidates. In brief: Sol is the
# quality-first default, Luna is the latency-first utility model, coding uses
# Codex then Terra then Sol, and deliberative roles use Sol with higher effort.
# The linked document separates catalog/API facts from provisional rollout
# judgments and records the cost, latency, availability, and fallback tradeoffs.

name: openai-chatgpt
description: "OpenAI ChatGPT backend (Codex auth) — GPT-5.6 role routing."
updated: "2026-07-16"

roles:
  general:
    description: "Versatile catch-all, no specialization needed"
    candidates: &sol_terra
      - {provider: openai-chatgpt, model: gpt-5.6-sol}
      - {provider: openai-chatgpt, model: gpt-5.6-terra}

  fast:
    description: "Quick utility tasks — latency and cost favored over maximum depth"
    candidates:
      - {provider: openai-chatgpt, model: gpt-5.6-luna}
      - {provider: openai-chatgpt, model: gpt-5.6-terra}
      - {provider: openai-chatgpt, model: gpt-5.6-sol}

  coding:
    description: "Code generation, implementation, debugging"
    candidates:
      - {provider: openai-chatgpt, model: gpt-5.6-codex}
      - {provider: openai-chatgpt, model: gpt-5.6-terra}
      - {provider: openai-chatgpt, model: gpt-5.6-sol}

  ui-coding:
    description: "Frontend/UI code — components, layouts, styling, spatial reasoning"
    candidates: *sol_terra

  security-audit:
    description: "Vulnerability assessment, attack surface analysis, code auditing"
    candidates: &sol_high
      - provider: openai-chatgpt
        model: gpt-5.6-sol
        config: {reasoning_effort: high}
      - provider: openai-chatgpt
        model: gpt-5.6-terra
        config: {reasoning_effort: high}

  reasoning:
    description: "Deep architectural reasoning, system design, complex multi-step analysis"
    candidates: *sol_high

  critique:
    description: "Adversarial evaluation — maximum deliberation to surface non-obvious flaws"
    candidates:
      - provider: openai-chatgpt
        model: gpt-5.6-sol
        config: {reasoning_effort: xhigh}
      - provider: openai-chatgpt
        model: gpt-5.6-terra
        config: {reasoning_effort: xhigh}

  creative:
    description: "Design direction, aesthetic judgment, high-quality creative output"
    candidates: *sol_terra

  writing:
    description: "Long-form content — documentation, marketing, and storytelling"
    candidates: *sol_terra

  research:
    description: "Deep investigation and information synthesis across sources"
    candidates: *sol_high

  vision:
    description: "Understanding visual input — screenshots, diagrams, and UI mockups"
    candidates: *sol_terra

  image-gen:
    description: "Degraded: planning, prompt crafting, and SVG only; no native image API"
    candidates: *sol_terra

  critical-ops:
    description: "High-reliability infrastructure, orchestration, and coordination"
    candidates: *sol_high
