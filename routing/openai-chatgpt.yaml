# OpenAI documents Sol as flagship, Terra as balanced, and Luna as efficient.
# This repository's routing policy uses Sol for general/quality work, Luna for
# the fast role, and a catalog-provided Codex model for coding. Availability is
# resolved against the live catalog; a final GPT-5 glob keeps every role usable
# during staged rollout without inventing a GPT-5.6 Codex ID.
name: openai-chatgpt
description: "OpenAI ChatGPT backend with account-scoped model discovery"
updated: "2026-07-19"
roles:
  general: &general
    candidates:
      - {provider: openai-chatgpt, model: gpt-5.6-sol}
      - {provider: openai-chatgpt, model: gpt-5.6-terra}
      - {provider: openai-chatgpt, model: gpt-5.6-luna}
      - {provider: openai-chatgpt, model: "gpt-5.*"}
  fast:
    candidates:
      - {provider: openai-chatgpt, model: gpt-5.6-luna}
      - {provider: openai-chatgpt, model: gpt-5.6-terra}
      - {provider: openai-chatgpt, model: gpt-5.6-sol}
      - {provider: openai-chatgpt, model: "gpt-5.*"}
  ui-coding: *general
  creative: *general
  writing: *general
  vision: *general
  image-gen: *general
  coding:
    candidates:
      - {provider: openai-chatgpt, model: "gpt-?.?-codex*"}
      - {provider: openai-chatgpt, model: gpt-5.6-terra}
      - {provider: openai-chatgpt, model: gpt-5.6-sol}
      - {provider: openai-chatgpt, model: "gpt-5.*"}
  reasoning: &reasoning
    candidates:
      - provider: openai-chatgpt
        model: gpt-5.6-sol
        config: {reasoning_effort: high}
      - provider: openai-chatgpt
        model: gpt-5.6-terra
        config: {reasoning_effort: high}
      - {provider: openai-chatgpt, model: "gpt-5.*"}
  security-audit: *reasoning
  research: *reasoning
  critical-ops: *reasoning
  critique:
    candidates:
      - provider: openai-chatgpt
        model: gpt-5.6-sol
        config: {reasoning_effort: max}
      - provider: openai-chatgpt
        model: gpt-5.6-terra
        config: {reasoning_effort: xhigh}
      - {provider: openai-chatgpt, model: "gpt-5.*"}
